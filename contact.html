<main>
<section class="page-hero"><div class="container"><p class="eyebrow">CONTACT</p><h1 class="section-title">案件のご相談</h1><p class="lead">内容が固まっていない段階でも、お気軽にご相談いただけます。</p></div></section>
<section class="section"><div class="container grid-2"><article class="card"><h3>相談内容の選択</h3><p>案件のご相談（内装工事・原状回復）／協力会社について／採用について／その他のお問い合わせ。</p><p>内容確認後、通常1〜2営業日以内を目安にご連絡いたします。</p></article><article class="card"><h3>送信前のご案内</h3><p>現地調査・お見積もりは無料です。小規模案件や採用・協力会社に関するご相談も同じフォームで受け付けます。</p></article></div></section>
<section class="section"><div class="container"><form class="contact-form card"><div class="form-grid"><div class="form-group"><label>お名前</label><input required /></div><div class="form-group"><label>会社名</label><input /></div><div class="form-group"><label>メールアドレス</label><input type="email" required /></div><div class="form-group"><label>電話番号</label><input type="tel" /></div><div class="form-group full"><label>お問い合わせ種別（必須）</label><select required><option>案件のご相談</option><option>協力会社について</option><option>採用について</option><option>その他のお問い合わせ</option></select></div><div class="form-group"><label>物件種別</label><input placeholder="例：マンション" /></div><div class="form-group full"><label>ご相談内容</label><textarea required></textarea></div></div><div class="hero-actions"><button class="btn btn-primary" type="submit">送信する</button></div></form></div></section>
<section class="section"><div class="container"><h2 class="section-title">FAQ</h2><div class="accordion-item"><button class="accordion-trigger" aria-expanded="false">小規模案件から相談できますか</button><div class="accordion-panel">はい、部分補修レベルから対応可能です。</div></div><div class="accordion-item"><button class="accordion-trigger" aria-expanded="false">内容が未確定でも大丈夫ですか</button><div class="accordion-panel">問題ありません。段階的に必要情報を整理してご案内します。</div></div></div></section>
